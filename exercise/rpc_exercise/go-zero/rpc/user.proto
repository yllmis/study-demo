syntax = "proto3";

package user;

option go_package = "./user";

service User {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  rpc Ping(Request) returns (Response);
}

message Request{}

message Response{}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  string id = 1;
  string name = 2;
  string phone = 3;
}